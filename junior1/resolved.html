<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junior 1 - Resolver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: "#0f172a",
                panel: "#dbeafe",
                soft: "#f8fafc",
                accent: "#2563eb",
                accentDark: "#1d4ed8"
              }
            },
            boxShadow: {
              login: "0 24px 60px rgba(15, 23, 42, 0.18)"
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen min-w-screen bg-blue-50 px-4 py-8 text-slate-900 flex justify-center items-center">
    <main class="mx-auto flex max-w-full">
      <section class="w-full border border-slate-200 bg-white p-8 rounded-2xl shadow-md">
        <div class="mb-6">
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-brand-accent">
            Archivo de trabajo
          </p>

        <form id="basic-login-form" class="space-y-5 flex flex-col justify-center">
          <div>
            <h2 class="text-2xl font-bold text-slate-900 font-serif">Iniciar Sesión</h2>
            <p class="mt-2 text-sm text-slate-500">
              ¡Bienvenido a YurtzCamp! Estamos contentos de que quieras desarrollarte con nosotros.
            </p>
          </div>

          <img
            src="./logo.svg"
            alt="Logo de YurtzCamp"
            class="h-20 w-20 order-first self-center"
          />

          <div class="space-y-2 inline-flex">
            <label for="username" class="text-sm font-semibold font-serif text-slate-700 self-center mr-[3.3rem]">
              Usuario
            </label>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="Usuario"
              class="w-full border border-slate-300 px-4 py-3 rounded-xl max-w-[60%] outline-blue-500/75"
              required
            />
          </div>

          <div class="space-y-2 inline-flex">
            <label for="password" class="text-sm font-semibold text-slate-700 self-center mr-10">
              Contraseña
            </label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Clave"
              class="w-full border border-slate-300 px-4 py-3 rounded-xl max-w-[60%] outline-blue-500/75"
              required
            />
          </div>

          <button
            type="submit"
            class="w-full
            bg-brand-accent
            px-4 py-3 
            text-sm font-semibold text-white 
            rounded-xl 
            hover:scale-105 transition duration-300
            hover:bg-brand-accentDark"
          >
            Ingresar
          </button>

          <p
            id="form-message"
            class="hidden border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700"
            role="note"
          ></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("basic-login-form");
      const message = document.getElementById("form-message");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const formData = new FormData(form);
        const username = String(formData.get("username") || "").trim();
        const password = String(formData.get("password") || "").trim();

        if (!username || !password) {
          message.textContent = "Completa usuario y contrasena para continuar.";
          message.classList.remove("hidden");
          return;
        }

        message.textContent = `Hola ${username}, formulario enviado.`;
        message.classList.remove("hidden");
        form.reset();
      });
    </script>
  </body>
</html>
