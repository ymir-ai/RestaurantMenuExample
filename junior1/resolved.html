<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junior 1 - Resolver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: "#0f172a",
              panel: "#dbeafe",
              soft: "#f8fafc",
              accent: "#2563eb",
              accentDark: "#1d4ed8"
            }
          },
          boxShadow: {
            login: "0 24px 60px rgba(15, 23, 42, 0.18)"
          }
        }
      }
    };
  </script>
</head>

<body class="min-h-screen overflow-hidden bg-gradient-to-br from-brand-panel via-white to-brand-soft px-4 py-8 font-sans text-slate-900">
  <main class="mx-auto flex min-h-[calc(100vh-4rem)] items-center justify-center max-w-5xl">
    <section class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white p-8 shadow-login">
      <div class="mb-6 text-center">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-brand-accent">
          Archivo de trabajo
        </p>
        <h1 class="mt-3 break-words font-serif text-4xl font-bold text-brand-dark md:text-5xl">
          Completa este login con Tailwind
        </h1>
        <p class="mt-3 text-base leading-7 text-slate-600">
          Este archivo esta resuelto para mostrar un login centrado,
          responsivo y listo para validar el envio.
        </p>
      </div>

      <form id="login-form" class="space-y-5">
        <img src="./logo.svg" alt="Logo de YurtzCamp" class="mx-auto h-20 w-20 rounded-full bg-brand-soft p-2" />

        <div class="text-center">
          <h2 class="font-serif text-2xl font-bold text-slate-900">Iniciar sesion</h2>
          <p class="mt-2 font-mono text-sm text-slate-600">
            Bienvenido a YurtzCamp.
          </p>
        </div>

        <div class="grid gap-2 sm:grid-cols-[120px,1fr] sm:items-center">
          <label for="username" class="text-sm font-semibold text-slate-700 sm:text-right">
            Usuario
          </label>
          <input id="username" name="username" type="text" placeholder="carlos.dev"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-brand-accent" required />
        </div>

        <div class="grid gap-2 sm:grid-cols-[120px,1fr] sm:items-center">
          <label for="password" class="text-sm font-semibold text-slate-700 sm:text-right">
            Contrasena
          </label>
          <input id="password" name="password" type="password" placeholder="********"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-brand-accent" required />
        </div>

        <button id="login-message"
          type="submit"
          class="w-full rounded-xl bg-brand-accent px-4 py-3 text-sm font-semibold text-white transition duration-300 hover:-translate-y-1 hover:scale-[1.05] hover:bg-brand-accentDark">
          Ingresar
        </button>

        <p id="form-message"
          class="hidden rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700"
          role="status">Bienvenido ${username}</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const message = document.getElementById("form-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const formData = new FormData(form);
      const username = String(formData.get("username") || "").trim();
      const password = String(formData.get("password") || "").trim();

      if (!username || !password) {
        message.textContent = "Completa usuario y contrasena para continuar.";
        message.classList.remove("hidden");
        return;
      }

      message.textContent = `Bienvenido ${username}, formulario enviado.`;
      message.classList.remove("hidden");
      form.reset();
    });
  </script>
</body>

</html>
